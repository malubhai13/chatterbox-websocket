<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatterbox</title>
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ═══════════════════════════════════════
       MODAL — Username + Room selector
  ════════════════════════════════════════ -->
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-logo">
        <span class="logo-icon">💬</span>
        <h1>Chatterbox</h1>
        <p>Real-time rooms. Real conversations.</p>
      </div>

      <div class="modal-form">
        <label for="username-input">Your Name</label>
        <input
          type="text"
          id="username-input"
          placeholder="e.g. Anish"
          maxlength="20"
          autocomplete="off"
        />

        <label for="room-select-modal">Pick a Room</label>
        <select id="room-select-modal">
          <option value="General">💬 General</option>
          <option value="Tech">💻 Tech</option>
          <option value="Fun">🎉 Fun</option>
        </select>

        <button id="join-btn">Enter Room →</button>
        <p id="modal-error" class="modal-error"></p>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════
       MAIN APP LAYOUT
  ════════════════════════════════════════ -->
  <div id="app" class="app hidden">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="logo-icon-sm">💬</span>
        <span class="brand">Chatterbox</span>
      </div>

      <nav class="room-nav">
        <p class="nav-label">Rooms</p>
        <button class="room-btn active" data-room="General">
          <span class="room-icon">💬</span> General
          <span class="badge" id="badge-General"></span>
        </button>
        <button class="room-btn" data-room="Tech">
          <span class="room-icon">💻</span> Tech
          <span class="badge" id="badge-Tech"></span>
        </button>
        <button class="room-btn" data-room="Fun">
          <span class="room-icon">🎉</span> Fun
          <span class="badge" id="badge-Fun"></span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <div class="user-pill">
          <span class="avatar" id="user-avatar"></span>
          <span id="sidebar-username"></span>
        </div>
      </div>
    </aside>

    <!-- Chat Panel -->
    <main class="chat-panel">

      <!-- Top Bar -->
      <header class="chat-header">
        <div class="header-info">
          <span id="header-room-icon">💬</span>
          <div>
            <h2 id="header-room-name">General</h2>
            <p id="header-status" class="header-status">Connected</p>
          </div>
        </div>
        <div class="header-badge">
          <span id="connection-dot" class="dot green"></span>
          <span id="connection-label">Live</span>
        </div>
      </header>

      <!-- Messages -->
      <section id="messages" class="messages-container">
        <div class="welcome-msg">
          <span>👋</span>
          <p>Welcome! Say something to start the conversation.</p>
        </div>
      </section>

      <!-- Typing Indicator -->
      <div id="typing-indicator" class="typing-indicator hidden">
        <div class="typing-dots">
          <span></span><span></span><span></span>
        </div>
        <span id="typing-text"></span>
      </div>

      <!-- Input Bar -->
      <footer class="input-bar">
        <input
          type="text"
          id="message-input"
          placeholder="Type a message…"
          autocomplete="off"
          maxlength="500"
        />
        <button id="send-btn" title="Send message">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </footer>

    </main>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
